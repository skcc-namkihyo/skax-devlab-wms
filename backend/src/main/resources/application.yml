spring:
  application:
    name: wms-backend

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://skax-dev-db1.postgres.database.azure.com:5432/wms
    username: tms_developer
    password: "TmsDeveloper@2026"
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    # 프론트·Mock JSON과 동일하게 snake_case 키 유지
    map-underscore-to-camel-case: false
    default-fetch-size: 100
    default-statement-timeout: 30

jwt:
  # HS256용 최소 32바이트 이상
  secret: wms-jwt-secret-key-for-development-only-min-32-chars-required!!
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  packages-to-scan: com.execnt

logging:
  level:
    com.execnt: DEBUG
    org.springframework.security: INFO
    org.mybatis: DEBUG
